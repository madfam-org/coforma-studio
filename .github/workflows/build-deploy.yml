name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:
    inputs:
      deploy_ack:
        description: "Type production to approve this production deploy."
        required: true
        type: string
      reason:
        description: "Production deploy reason (min 12 chars)."
        required: true
        type: string
concurrency:
  group: coforma-production-kustomization
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, Push & Update Manifests
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Require manual production deploy acknowledgement
        if: github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_ACK: ${{ inputs.deploy_ack }}
          DEPLOY_REASON: ${{ inputs.reason }}
        run: |
          if [ "${DEPLOY_ACK}" != "production" ]; then
            echo "deploy_ack must be production" >&2
            exit 1
          fi
          if [ ${#DEPLOY_REASON} -lt 12 ]; then
            echo "reason must be at least 12 characters" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        continue-on-error: true
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v7
        id: build-web
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/coforma-studio/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/madfam-org/coforma-studio/web@${{ steps.build-web.outputs.digest }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Update web image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/coforma-studio/web=ghcr.io/madfam-org/coforma-studio/web@${{ steps.build-web.outputs.digest }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/production/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image digests [skip ci]"
          git push
