- name: ghcr.io/madfam-org/coforma-studio/web
  newName: ghcr.io/madfam-org/coforma-studio/web
- name: ghcr.io/madfam-org/coforma-studio/admin
  newName: ghcr.io/madfam-org/coforma-studio/admin
