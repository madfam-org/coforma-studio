apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: coforma-studio
resources:
- namespace.yaml
- api-deployment.yaml
- api-service.yaml
- web-deployment.yaml
- web-service.yaml
- admin-deployment.yaml
- admin-service.yaml
- network-policies.yaml
images:
- name: ghcr.io/madfam-org/coforma-studio/api
